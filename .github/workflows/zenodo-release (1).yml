name: Zenodo Release
on:
  push:
    tags: ['v*.*.*']
  repository_dispatch:
    types: [release-created]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (v*.*.*)' 
        required: true
        default: 'v2.1.0'
      publish:
        description: 'Publish now? true/false'
        default: 'false'
permissions:
  contents: read
env:
  ZENODO_API: https://zenodo.org/api
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify ZENODO_TOKEN exists
        run: |
          if [ -z "${{ secrets.ZENODO_TOKEN }}" ]; then
            echo "::error::ZENODO_TOKEN is not set!"
            echo "Go to: Settings → Secrets → Actions → New secret"
            echo "Name: ZENODO_TOKEN"
            echo "Value: get from zenodo.org → Account → Applications → Personal access tokens"
            exit 1
          fi
          echo "Token OK (${#ZENODO_TOKEN} chars)"
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}

      - name: Install XeLaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex texlive-latex-extra texlive-science \
            texlive-bibtex-extra biber fonts-dejavu
          echo "TeX installed"

      - name: Find and compile .tex
        id: pdf
        run: |
          MAIN=""
          for f in main.tex monograph.tex nullo_fmp.tex nullo.tex fmp.tex; do
            [ -f "$f" ] && MAIN="$f" && break
          done
          [ -z "$MAIN" ] && MAIN=$(find . -maxdepth 2 -name "*.tex" \
            ! -path "./.github/*" | head -1)
          if [ -z "$MAIN" ]; then
            echo "::warning::No .tex found – skipping PDF build"
            echo "pdf=" >> "$GITHUB_OUTPUT"
          else
            BASE="${MAIN%.tex}"
            xelatex -interaction=nonstopmode "$MAIN" 2>&1 | tail -3
            biber "$BASE" 2>&1 | tail -2 || true
            xelatex -interaction=nonstopmode "$MAIN" 2>&1 | tail -3
            xelatex -interaction=nonstopmode "$MAIN" 2>&1 | tail -3
            PDF=$(find . -maxdepth 1 -name "*.pdf" | head -1)
            echo "pdf=${PDF#./}" >> "$GITHUB_OUTPUT"
            echo "PDF: $PDF"
          fi

      - name: Create Zenodo deposition
        id: dep
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          R=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            "$ZENODO_API/deposit/depositions" -d '{}')
          ID=$(echo "$R" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          BK=$(echo "$R" | python3 -c "import sys,json; print(json.load(sys.stdin)['links']['bucket'])")
          echo "dep_id=$ID" >> "$GITHUB_OUTPUT"
          echo "bucket=$BK" >> "$GITHUB_OUTPUT"
          echo "Deposition: $ID"

      - name: Upload .zenodo.json metadata
        if: hashFiles('.zenodo.json') != ''
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          META=$(python3 -c "import json; d=json.load(open('.zenodo.json')); print(json.dumps({'metadata':d}))")
          curl -sf -X PUT \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            "$ZENODO_API/deposit/depositions/${{ steps.dep.outputs.dep_id }}" \
            -d "$META"
          echo "Metadata uploaded"

      - name: Upload PDF
        if: steps.pdf.outputs.pdf != ''
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            --upload-file "${{ steps.pdf.outputs.pdf }}" \
            "${{ steps.dep.outputs.bucket }}/$(basename ${{ steps.pdf.outputs.pdf }})"
          echo "PDF uploaded"

      - name: Upload source ZIP
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          V="${{ github.event.inputs.version || github.ref_name || 'v2.1.0' }}"
          ZIP="FMP-monograph-${V}-source.zip"
          zip -r "$ZIP" . --exclude ".git/*" --exclude ".github/*" \
            --exclude "*.pdf" --exclude "*.zip"
          curl -sf -X PUT \
            -H "Authorization: Bearer $ZENODO_TOKEN" \
            --upload-file "$ZIP" \
            "${{ steps.dep.outputs.bucket }}/${ZIP}"
          echo "Source ZIP uploaded"

      - name: Publish or save draft
        id: pub
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
        run: |
          DEP="${{ steps.dep.outputs.dep_id }}"
          PUBLISH="${{ github.event.inputs.publish }}"
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "push" ] || [ "$PUBLISH" = "true" ]; then
            R=$(curl -sf -X POST \
              -H "Authorization: Bearer $ZENODO_TOKEN" \
              "$ZENODO_API/deposit/depositions/${DEP}/actions/publish")
            DOI=$(echo "$R" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('doi','?'))" 2>/dev/null)
            echo "✅ Published — DOI: $DOI"
            echo "doi=$DOI" >> "$GITHUB_OUTPUT"
          else
            echo "📝 Saved as draft — ID: $DEP"
            echo "Re-run with publish=true to publish"
          fi

      - run: |
          echo "## Zenodo Release" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deposition: ${{ steps.dep.outputs.dep_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- DOI: ${{ steps.pub.outputs.doi || 'draft' }}" >> "$GITHUB_STEP_SUMMARY"
