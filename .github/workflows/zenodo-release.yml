name: Zenodo DOI Sync

on:
  workflow_dispatch:
    inputs:
      expected_doi:
        description: "Existing DOI to verify, for example 10.5281/zenodo.20116240"
        required: false
        default: ""
      build_pdf:
        description: "Build PDF from TeX source"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

concurrency:
  group: zenodo-doi-sync-${{ github.repository }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  verify-and-build:
    name: Verify DOI metadata and optionally build PDF
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate repository metadata
        shell: bash
        run: |
          set -euo pipefail

          if [ -f ".zenodo.json" ]; then
            python3 -m json.tool .zenodo.json > /dev/null
            echo ".zenodo.json is valid JSON"
          else
            echo "::warning::.zenodo.json is not present. DOI sync can continue, but repository metadata should be added."
          fi

          if [ -f "CITATION.cff" ]; then
            echo "CITATION.cff present"
          else
            echo "::warning::CITATION.cff is not present."
          fi

      - name: Verify existing DOI on Zenodo
        id: doi
        shell: bash
        run: |
          set -euo pipefail
          DOI="${{ github.event.inputs.expected_doi }}"

          if [ -z "$DOI" ]; then
            echo "No expected DOI supplied. Skipping DOI API check."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NORMALIZED=$(printf '%s' "$DOI" | sed 's#https://doi.org/##I' | tr '[:upper:]' '[:lower:]')
          RECORD_ID=$(printf '%s' "$NORMALIZED" | awk -F. '{print $NF}')

          if ! printf '%s' "$NORMALIZED" | grep -Eq '^10\.5281/zenodo\.[0-9]+$'; then
            echo "::warning::Expected DOI does not look like a Zenodo DOI: $DOI"
            echo "status=unverified_format" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RESPONSE=$(curl --retry 3 --retry-all-errors --connect-timeout 20 --max-time 60 -fsSL "https://zenodo.org/api/records/${RECORD_ID}" || true)
          if [ -z "$RESPONSE" ]; then
            echo "::error::Zenodo record not found or API unavailable for DOI: $DOI"
            echo "status=not_found" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          FOUND_DOI=$(printf '%s' "$RESPONSE" | python3 -c "import json,sys; print((json.load(sys.stdin).get('doi') or '').lower())")
          if [ "$FOUND_DOI" != "$NORMALIZED" ]; then
            echo "::error::Zenodo returned DOI '$FOUND_DOI', expected '$NORMALIZED'"
            echo "status=mismatch" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          TITLE=$(printf '%s' "$RESPONSE" | python3 -c "import json,sys; print(json.load(sys.stdin).get('metadata',{}).get('title',''))")
          echo "Verified DOI: $FOUND_DOI"
          echo "Title: $TITLE"
          echo "status=verified" >> "$GITHUB_OUTPUT"
          echo "found_doi=$FOUND_DOI" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Install TeX build tools
        if: github.event.inputs.build_pdf == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-latex-extra \
            texlive-science \
            texlive-bibtex-extra \
            texlive-lang-cyrillic \
            biber \
            fonts-dejavu \
            zip

      - name: Find TeX entry point
        if: github.event.inputs.build_pdf == 'true'
        id: tex
        shell: bash
        run: |
          set -euo pipefail
          MAIN=""
          for candidate in fractal_metascience_main.tex main.tex monograph.tex nullo_ontological_zero_point.tex nullo_fmp.tex nullo.tex fmp.tex; do
            if [ -f "$candidate" ]; then
              MAIN="$candidate"
              break
            fi
          done

          if [ -z "$MAIN" ]; then
            MAIN=$(find . -maxdepth 3 -name "*.tex" ! -path "./.github/*" | sort | head -n 1 || true)
          fi

          if [ -z "$MAIN" ]; then
            echo "::warning::No TeX source found. Skipping PDF build."
            echo "main=" >> "$GITHUB_OUTPUT"
            echo "base=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "main=$MAIN" >> "$GITHUB_OUTPUT"
          echo "base=${MAIN%.tex}" >> "$GITHUB_OUTPUT"
          echo "Using TeX entry point: $MAIN"

      - name: Build PDF
        if: github.event.inputs.build_pdf == 'true' && steps.tex.outputs.main != ''
        id: pdf
        shell: bash
        run: |
          set -euo pipefail
          MAIN="${{ steps.tex.outputs.main }}"
          BASE="${{ steps.tex.outputs.base }}"

          xelatex -interaction=nonstopmode -halt-on-error "$MAIN"
          if [ -f "${BASE}.bcf" ]; then
            biber "$BASE"
          fi
          xelatex -interaction=nonstopmode -halt-on-error "$MAIN"
          xelatex -interaction=nonstopmode -halt-on-error "$MAIN"

          PDF="${BASE}.pdf"
          if [ ! -f "$PDF" ]; then
            PDF=$(find . -maxdepth 2 -name "*.pdf" | sort | head -n 1 || true)
          fi

          if [ -z "$PDF" ] || [ ! -f "$PDF" ]; then
            echo "::error::PDF build finished but no PDF file was found."
            exit 1
          fi

          echo "pdf=${PDF#./}" >> "$GITHUB_OUTPUT"
          echo "Built PDF: ${PDF#./}"

      - name: Upload built PDF as workflow artifact
        if: github.event.inputs.build_pdf == 'true' && steps.pdf.outputs.pdf != ''
        uses: actions/upload-artifact@v4
        with:
          name: built-pdf
          path: ${{ steps.pdf.outputs.pdf }}

      - name: Summary
        shell: bash
        run: |
          echo "## Zenodo DOI Sync" >> "$GITHUB_STEP_SUMMARY"
          echo "- Expected DOI: ${{ github.event.inputs.expected_doi || 'not supplied' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- DOI status: ${{ steps.doi.outputs.status || 'not checked' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Found DOI: ${{ steps.doi.outputs.found_doi || 'n/a' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Title: ${{ steps.doi.outputs.title || 'n/a' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Built PDF: ${{ steps.pdf.outputs.pdf || 'not built' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow does not create a new Zenodo deposition. It verifies/synchronizes an existing DOI and builds the local source package." >> "$GITHUB_STEP_SUMMARY"
